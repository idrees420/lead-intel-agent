<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lead Intel - AI Intelligence</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <!-- Animated background elements -->
    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>
    <div class="bg-shape shape-3"></div>
    
    <div class="app-container">
      <!-- Sidebar -->
      <aside class="sidebar glass-panel">
        <div class="brand">
          <div class="brand-logo">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M2 17L12 22L22 17" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M2 12L12 17L22 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="brand-text">
            <h1>Lead Intel</h1>
            <p>AI Sales Intelligence</p>
          </div>
        </div>

        <div class="sidebar-section">
          <div class="section-header">
            <h2>Recent Sessions</h2>
            <button id="refresh-sessions" class="icon-btn" title="Refresh">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M21 2v6h-6M3 12a9 9 0 0 1 15-6.7L21 8M3 22v-6h6M21 12a9 9 0 0 1-15 6.7L3 16" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
          </div>
          <div class="session-list scrollable" id="session-list">
            <!-- Session cards injected here -->
          </div>
        </div>
      </aside>

      <!-- Main Content -->
      <main class="main-content">
        <header class="top-nav">
          <h2 class="page-title">Intelligence Dashboard</h2>
        </header>

        <div class="content-grid">
          <!-- Research Form -->
          <section class="glass-card form-section">
            <div class="card-header">
              <div class="icon-wrapper primary">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <circle cx="11" cy="11" r="8" stroke="currentColor" stroke-width="2"/>
                  <path d="M21 21L16.65 16.65" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
              </div>
              <h3>Start Research</h3>
            </div>
            
            <form id="research-form" class="modern-form">
              <div class="form-group">
                <input type="text" id="company-name" placeholder=" " required />
                <label for="company-name">Company Name</label>
                <div class="input-glow"></div>
              </div>
              
              <div class="form-row">
                <div class="form-group">
                  <input type="text" id="target-industry" placeholder=" " />
                  <label for="target-industry">Target Industry</label>
                  <div class="input-glow"></div>
                </div>
                <div class="form-group">
                  <input type="text" id="target-role" placeholder=" " value="CEO" />
                  <label for="target-role">Target Role</label>
                  <div class="input-glow"></div>
                </div>
              </div>
              
              <div class="form-group slider-group">
                <div class="slider-header">
                  <label for="max-attempts">Review Attempts</label>
                  <span class="badge" id="attempts-val">3</span>
                </div>
                <input type="range" id="max-attempts" min="1" max="10" value="3" class="styled-slider" />
              </div>

              <button type="submit" class="btn btn-primary w-full" id="run-research-btn">
                <span id="research-btn-text">Run Intelligence Scan</span>
                <div class="loader-spinner hidden" id="research-loader"></div>
              </button>
            </form>
          </section>

          <!-- Results Section -->
          <section class="results-section">
            <div class="results-header">
              <h3>Session Insights</h3>
              <button id="download-report" class="btn btn-outline btn-sm hidden" style="display: none;">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                Export PDF
              </button>
            </div>

            <div class="insights-grid" id="insights-grid">
              <!-- Empty State -->
              <div class="empty-state" id="empty-state">
                <div class="empty-icon-container">
                  <div class="pulse-ring"></div>
                  <div class="empty-icon">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                      <path d="M9 12h6M9 16h6M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16l3.5-2 3.5 2 3.5-2 3.5 2z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                  </div>
                </div>
                <p>Awaiting coordinates. Run a scan to gather insights.</p>
              </div>

              <!-- Content Cards (Hidden initially) -->
              <div class="glass-card insight-card col-span-2 hidden" id="summary-card" style="display: none;">
                <div class="card-header">
                  <div class="icon-wrapper accent-1">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M4 19h16M4 15h16M4 11h16M4 7h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
                  </div>
                  <h4>Research Summary</h4>
                </div>
                <div class="card-body markdown-body scrollable" id="research-summary"></div>
              </div>

              <div class="glass-card insight-card col-span-2 hidden" id="notes-card" style="display: none;">
                <div class="card-header">
                  <div class="icon-wrapper accent-2">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 20h9M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                  </div>
                  <h4>Key Notes</h4>
                </div>
                <div class="card-body markdown-body scrollable" id="research-notes"></div>
              </div>

              <div class="glass-card insight-card col-span-2 hidden" id="email-card" style="display: none;">
                <div class="card-header flex-between">
                  <div class="flex-center gap-sm">
                    <div class="icon-wrapper primary">
                      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M22 6l-10 7L2 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    </div>
                    <h4>Drafted Outreach</h4>
                  </div>
                  <button id="generate-email" class="btn btn-glow btn-sm">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    <span id="generate-text">Generate Email</span>
                    <div class="loader-spinner hidden" id="email-loader"></div>
                  </button>
                </div>
                <div class="card-body">
                  <div class="email-preview">
                    <div class="email-subject-line hidden" id="email-subject-container" style="display: none;">
                      <span class="label">Subject:</span>
                      <strong id="email-subject"></strong>
                    </div>
                    <div class="markdown-body scrollable" id="email-output">Email will appear here once generated.</div>
                    <div class="email-actions hidden" id="email-actions-container" style="display: none; margin-top: 15px; border-top: 1px solid var(--border-color); padding-top: 15px;">
                      <div class="form-group" style="display: flex; gap: 10px;">
                        <input type="email" id="recipient-email" placeholder="Recipient Email Address" style="flex: 1; padding: 8px 12px; border-radius: 6px; border: 1px solid var(--border-color); background: var(--bg-secondary); color: var(--text-primary);" />
                        <button id="send-smtp-email" class="btn btn-primary btn-sm">
                          <span id="send-smtp-text">Send Now</span>
                          <div class="loader-spinner hidden" id="send-smtp-loader"></div>
                        </button>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </section>
        </div>
      </main>
    </div>

    <div id="toast-container" class="toast-container"></div>
    <script src="https://cdn.jsdelivr.net/npm/marked@4.3.0/marked.min.js"></script>
    <script src="/static/app.js"></script>
  </body>
</html>
